<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calmkeep Chat</title>

<!-- PDF parser -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
:root{
--bg:#0b1020;
--card:#11172e;
--muted:#a7b8d0;
--text:#eaf2ff;
--electric:#24a4ff;
--seafoam:#89f3d1;
--shadow:0 12px 34px rgba(0,0,0,.38);
--r:18px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:"Segoe UI",Roboto,sans-serif;
background:
radial-gradient(1000px 500px at 2% 1%, rgba(137,243,209,.12), transparent 60%),
radial-gradient(950px 480px at 98% 99%, rgba(36,164,255,.12), transparent 65%),
linear-gradient(#0b1020,#0b1020);
color:var(--text);
padding:24px;
}

.wrap{max-width:1100px;margin:0 auto;}

h1{
font-size:28px;
margin-bottom:14px;
background:linear-gradient(90deg,var(--electric),var(--seafoam));
-webkit-background-clip:text;
color:transparent;
}

.row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}

.card{
background:linear-gradient(180deg, rgba(36,164,255,.07), rgba(137,243,209,.05) 65%, rgba(0,0,0,.2)), var(--card);
border-radius:var(--r);
box-shadow:var(--shadow);
padding:16px;
}

label{display:block;font-size:12px;color:var(--muted);margin-bottom:8px;}

input, textarea{
width:100%;
border-radius:12px;
border:1px solid rgba(255,255,255,.10);
background:#0a0f22;
color:var(--text);
padding:12px;
font-size:14px;
outline:none;
}

textarea{resize:vertical;}

.btn{
cursor:pointer;
padding:12px 16px;
border-radius:999px;
border:none;
font-weight:700;
font-size:14px;
color:#fff;
background:linear-gradient(180deg,#1b97ff,#0b72c4);
box-shadow:0 0 18px rgba(36,164,255,.35), 0 8px 30px rgba(0,0,0,.35);
}

.btn.secondary{
background:linear-gradient(180deg,#89f3d1,#5ad4b3);
color:#0b1020;
}

.btn.ghost{
background:transparent;
border:1px solid rgba(255,255,255,.14);
box-shadow:none;
color:var(--text);
}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;align-items:center;}

.hint{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.6;}

.chat{
height:72vh;
overflow:auto;
padding:14px;
border-radius:var(--r);
background:#080c1a;
border:1px solid rgba(255,255,255,.08);
}

.msg{margin:10px 0;display:flex;}

.bubble{
max-width:82%;
padding:12px 14px;
border-radius:16px;
line-height:1.55;
white-space:pre-wrap;
word-wrap:break-word;
border:1px solid rgba(255,255,255,.08);
}

.me{justify-content:flex-end;}
.me .bubble{background:rgba(36,164,255,.12);}

.bot{justify-content:flex-start;}
.bot .bubble{background:rgba(137,243,209,.10);}

.meta{font-size:11px;color:rgba(167,184,208,.8);margin-top:6px;}

.composer{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:14px;}

.status{margin-top:10px;font-size:12px;color:var(--muted);}

.tiny{font-size:12px;color:var(--muted);}

/* document drop zone */

.dropzone{
border:2px dashed rgba(255,255,255,.18);
border-radius:14px;
padding:18px;
text-align:center;
color:var(--muted);
margin-bottom:10px;
transition:all .2s;
}

.dropzone.drag{
border-color:var(--electric);
background:rgba(36,164,255,.08);
}

.docItem{
display:flex;
justify-content:space-between;
align-items:center;
font-size:12px;
margin-top:6px;
}

.docName{
opacity:.9;
}

.removeDoc{
font-size:11px;
padding:4px 8px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Calmkeep Chat</h1>

<div class="row">

<div class="card">

<label>Keys (stored locally in your browser)</label>

<input id="calmkeepKey" placeholder="Calmkeep key (ck_...)" autocomplete="off" />

<div style="height:10px"></div>

<input id="anthropicKey" placeholder="Claude API key (sk-ant-...)" autocomplete="off" />

<div class="controls">
<button class="btn secondary" id="saveBtn">Save keys</button>
<button class="btn ghost" id="clearKeysBtn">Clear keys</button>

<label class="tiny">
<input type="checkbox" id="showKeys"> Show keys
</label>

</div>

<div class="hint">
Requests send headers: <code>calmkeep-key</code> and <code>anthropic-api-key</code>.
</div>

</div>


<div class="card">

<label>Service</label>

<div class="tiny">
Runtime: <code id="runtimeLabel"></code>
</div>

<div class="hint" style="margin-top:10px;">
Lightweight BYO Claude key web chat for Calmkeep.
</div>

<div class="controls">
<button class="btn" id="newChatBtn">New chat</button>
<button class="btn secondary" id="exportBtn">Export</button>
</div>

</div>

</div>


<!-- DOCUMENT CARD -->

<div class="card">

<label>Documents</label>

<div id="dropZone" class="dropzone">
Drag files here or
<button class="btn ghost" id="uploadBtn">Upload</button>
<input type="file" id="docUpload" multiple style="display:none">
</div>

<div id="docList" class="tiny"></div>

<div class="hint">
Documents are automatically included in the prompt context.
</div>

</div>


<div class="card">

<div class="chat" id="chat"></div>

<div class="composer">
<textarea id="prompt" placeholder="Type a message… (Shift+Enter for newline)"></textarea>
<button class="btn" id="sendBtn">Send</button>
</div>

<div class="status" id="status">Ready.</div>

<div class="hint">
This page keeps local message history and stitches it into one prompt.
</div>

</div>

</div>

<script>

const MODAL_RUNTIME_URL="https://diargallop--calmkeep-service-calmkeep-service.modal.run/runtime";

const LS={
ck:"ck_calmkeep_key",
ak:"ck_anthropic_key",
hist:"ck_chat_history_v1"
};

let history=[];
let documents=[];
const CHUNK_SIZE = 2500;
const MAX_CHUNKS = 6;

function chunkText(text){

  const chunks = [];
  let i = 0;

  while(i < text.length){
    chunks.push(text.slice(i, i + CHUNK_SIZE));
    i += CHUNK_SIZE;
  }

  return chunks;
}

const el=id=>document.getElementById(id);

function setStatus(msg){el("status").textContent=msg}
function scoreChunk(chunk, query){

  const words = query.toLowerCase().split(/\W+/);

  let score = 0;

  for(const w of words){
    if(w.length > 3 && chunk.toLowerCase().includes(w)){
      score++;
    }
  }

  return score;
}
function renderDocuments(){

const list=el("docList");
list.innerHTML="";

documents.forEach((doc,i)=>{

const div=document.createElement("div");
div.className="docItem";

div.innerHTML=`
<span class="docName">${doc.name}</span>
<button class="btn ghost removeDoc" data-i="${i}">remove</button>
`;

list.appendChild(div);

});

document.querySelectorAll(".removeDoc").forEach(btn=>{
btn.onclick=()=>{
documents.splice(btn.dataset.i,1);
renderDocuments();
};
});

}

async function parseFile(file){

const ext=file.name.split(".").pop().toLowerCase();

if(["txt","md","json","csv","js","ts","py","html"].includes(ext)){
return await file.text();
}

if(ext==="pdf"){

const buffer=await file.arrayBuffer();
const pdf=await pdfjsLib.getDocument({data:buffer}).promise;

let text="";

for(let i=1;i<=pdf.numPages;i++){
const page=await pdf.getPage(i);
const content=await page.getTextContent();
text+=content.items.map(s=>s.str).join(" ")+"\n\n";
}

return text;

}

return await file.text();
}

async function handleFiles(files){

for(const file of files){

setStatus("Processing "+file.name);

const text=await parseFile(file);

documents.push({
name:file.name,
chunks:chunkText(text)
});

}

renderDocuments();
setStatus("Documents ready.");

}

function stitchPrompt(){

let relevantChunks=[];

const lastUserMessage = history.length
? history[history.length-1].content
: "";

documents.forEach(doc=>{

doc.chunks.forEach(chunk=>{

relevantChunks.push({
doc:doc.name,
chunk,
score:scoreChunk(chunk,lastUserMessage)
});

});

});

relevantChunks.sort((a,b)=>b.score-a.score);

relevantChunks=relevantChunks.slice(0,MAX_CHUNKS);

let docText="";

if(relevantChunks.length){

docText="DOCUMENT CONTEXT:\n\n";

relevantChunks.forEach(c=>{
docText+=`--- ${c.doc} ---\n${c.chunk}\n\n`;
});

}

const lines=history.map(
m=>`${m.role==="user"?"User":"Assistant"}: ${m.content}`
);

return docText + lines.join("\n\n") + "\n\nAssistant:";

}

function addMessage(role,text){

const chatEl=el("chat");

const row=document.createElement("div");
row.className="msg "+(role==="user"?"me":"bot");

const bubble=document.createElement("div");
bubble.className="bubble";
bubble.textContent=text;

row.appendChild(bubble);
chatEl.appendChild(row);

chatEl.scrollTop=chatEl.scrollHeight;

}

async function send(text){

if(!text.trim())return;

addMessage("user",text);

history.push({role:"user",content:text});

setStatus("Calling runtime…");

const res=await fetch(MODAL_RUNTIME_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"calmkeep-key":el("calmkeepKey").value,
"anthropic-api-key":el("anthropicKey").value
},
body:JSON.stringify({
prompt:stitchPrompt(),
params:{}
})
});

const data=await res.json();

addMessage("assistant",data.result?.text||JSON.stringify(data));

history.push({
role:"assistant",
content:data.result?.text||""
});

setStatus("Ready.");

el("prompt").value="";

}

window.addEventListener("DOMContentLoaded",()=>{

el("runtimeLabel").textContent=MODAL_RUNTIME_URL;

el("sendBtn").onclick=()=>send(el("prompt").value);

el("prompt").addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();
send(el("prompt").value);
}
});

el("uploadBtn").onclick=()=>el("docUpload").click();

el("docUpload").addEventListener("change",e=>{
handleFiles(e.target.files);
});

const drop=el("dropZone");

drop.addEventListener("dragover",e=>{
e.preventDefault();
drop.classList.add("drag");
});

drop.addEventListener("dragleave",()=>{
drop.classList.remove("drag");
});

drop.addEventListener("drop",e=>{
e.preventDefault();
drop.classList.remove("drag");
handleFiles(e.dataTransfer.files);
});

});

</script>

</body>
</html>
