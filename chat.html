<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calmkeep</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* (unchanged styling — omitted here for brevity, keep yours exactly as is) */
</style>
</head>

<body>
<div class="wrap">
<h1>Calmkeep</h1>

<!-- LOGIN -->
<div class="card" id="loginCard">
  <h2 style="margin-bottom:12px;">Sign In</h2>
  <input id="email" placeholder="Email" />
  <div style="height:10px"></div>
  <input id="password" type="password" placeholder="Password" />
  <div style="margin-top:12px;">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<!-- (your entire UI remains unchanged) -->
</div>
</div>

<script>
// ======================
// CONFIG (YOUR REAL VALUES)
// ======================

const SUPABASE_URL = "https://maceztrkzrrdenomkidh.supabase.co";

const SUPABASE_ANON_KEY = 
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1hY2V6dHJrenJyZGVub21raWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0NDc4NTQsImV4cCI6MjA4NzAyMzg1NH0.E3NTmVFP-9SL_0yw-AMaihhjluVcRKxXraBtipHUaB4";

const MODAL_RUNTIME_URL =
"https://diargallop--calmkeep-service-calmkeep-service.modal.run/runtime";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let history = [];
let lockedText = "";

// ======================
// AUTH
// ======================

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert(error.message);
    return;
  }

  document.getElementById("loginCard").style.display="none";
  document.getElementById("app").style.display="block";
}

async function logout(){
  await supabaseClient.auth.signOut();
  document.getElementById("app").style.display="none";
  document.getElementById("loginCard").style.display="block";
}

window.addEventListener("load", async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session){
    document.getElementById("loginCard").style.display="none";
    document.getElementById("app").style.display="block";
  }
});

// ======================
// CHAT
// ======================

function addMessage(role, text){
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "msg " + (role === "user" ? "me" : "bot");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("prompt");
  const text = input.value.trim();
  if(!text) return;

  addMessage("user", text);
  history.push({role:"user",content:text});
  input.value="";

  const { data: { session } } = await supabaseClient.auth.getSession();

  const res = await fetch(MODAL_RUNTIME_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();
  const output = data?.result?.text || "Error";

  addMessage("assistant", output);
  history.push({role:"assistant",content:output});
}

function lockLast(){
  const last = history.filter(m=>m.role==="assistant").slice(-1)[0];
  if(!last) return;
  lockedText += "\n\n" + last.content;
  document.getElementById("locked").textContent = lockedText.trim();
}

function newChat(){
  history=[];
  document.getElementById("chat").innerHTML="";
  lockedText="";
  document.getElementById("locked").textContent="";
}

function exportChat(){
  const text = history.map(m=>`${m.role.toUpperCase()}: ${m.content}`).join("\n\n");
  const blob = new Blob([text], {type:"text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url;
  a.download="calmkeep-chat.txt";
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
