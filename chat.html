<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calmkeep</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#0b1020;
  --card:#11172e;
  --muted:#a7b8d0;
  --text:#eaf2ff;
  --electric:#24a4ff;
  --seafoam:#89f3d1;
  --shadow:0 12px 34px rgba(0,0,0,.38);
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"Segoe UI",Roboto,sans-serif;
  background:
    radial-gradient(1000px 500px at 2% 1%, rgba(137,243,209,.12), transparent 60%),
    radial-gradient(950px 480px at 98% 99%, rgba(36,164,255,.12), transparent 65%),
    linear-gradient(#0b1020,#0b1020);
  color:var(--text);
  padding:24px;
}
.wrap{max-width:1200px;margin:0 auto;}
h1{
  font-size:28px;
  margin-bottom:16px;
  background:linear-gradient(90deg,var(--electric),var(--seafoam));
  -webkit-background-clip:text;
  color:transparent;
}
.card{
  background:linear-gradient(180deg, rgba(36,164,255,.07), rgba(137,243,209,.05) 65%, rgba(0,0,0,.2)), var(--card);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:18px;
  margin-bottom:16px;
}
input, textarea, select{
  width:100%;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.10);
  background:#0a0f22;
  color:var(--text);
  padding:12px;
  font-size:14px;
  outline:none;
}
textarea{resize:vertical;}
.btn{
  cursor:pointer;
  padding:10px 16px;
  border-radius:999px;
  border:none;
  font-weight:700;
  font-size:14px;
  color:#fff;
  background:linear-gradient(180deg,#1b97ff,#0b72c4);
  box-shadow:0 0 18px rgba(36,164,255,.35);
}
.btn.secondary{
  background:linear-gradient(180deg,#89f3d1,#5ad4b3);
  color:#0b1020;
}
.row{display:grid;grid-template-columns:1fr 300px;gap:16px;}
.chat{
  height:60vh;
  overflow:auto;
  padding:14px;
  border-radius:var(--r);
  background:#080c1a;
  border:1px solid rgba(255,255,255,.08);
}
.msg{margin:10px 0;display:flex;}
.me{justify-content:flex-end;}
.bot{justify-content:flex-start;}
.bubble{
  max-width:80%;
  padding:12px 14px;
  border-radius:16px;
  line-height:1.55;
  white-space:pre-wrap;
  border:1px solid rgba(255,255,255,.08);
}
.me .bubble{background:rgba(36,164,255,.12);}
.bot .bubble{background:rgba(137,243,209,.10);}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.small-btn{
  font-size:12px;
  padding:6px 12px;
}
.sidebar-section{margin-bottom:18px;}
.sidebar-section h3{
  font-size:13px;
  margin-bottom:8px;
  color:var(--seafoam);
}
.locked-box{
  background:#080c1a;
  border:1px solid rgba(255,255,255,.08);
  padding:10px;
  border-radius:12px;
  min-height:80px;
  font-size:13px;
  white-space:pre-wrap;
}
.stability-meter{
  height:8px;
  background:#0a0f22;
  border-radius:999px;
  overflow:hidden;
}
.stability-fill{
  height:100%;
  width:75%;
  background:linear-gradient(90deg,var(--electric),var(--seafoam));
}
.composer{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  margin-top:14px;
}
</style>
</head>

<body>
<div class="wrap">
<h1>Calmkeep</h1>

<div class="card" id="loginCard">
  <h2 style="margin-bottom:12px;">Sign In</h2>
  <input id="email" placeholder="Email" />
  <div style="height:10px"></div>
  <input id="password" type="password" placeholder="Password" />
  <div style="margin-top:12px;">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<div id="app" style="display:none;">

<div class="topbar">
  <div>
    <button class="btn secondary small-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="card">
  <div class="chat" id="chat"></div>

  <div class="composer">
    <textarea id="prompt" placeholder="Type a message..."></textarea>
    <button class="btn" onclick="send()">Send</button>
  </div>
</div>

</div>
</div>

<script>
const SUPABASE_URL = "https://maceztrkzrrdenomkidh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_-0Z-efKCiP_9aP1Ve-m3YQ_bn9LZWDz";
const MODAL_RUNTIME_URL = "https://diargallop--calmkeep-service-calmkeep-service.modal.run/runtime";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let history = [];

async function login(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if(error){ alert(error.message); return; }

  document.getElementById("loginCard").style.display="none";
  document.getElementById("app").style.display="block";
}

async function logout(){
  await supabaseClient.auth.signOut();
  document.getElementById("app").style.display="none";
  document.getElementById("loginCard").style.display="block";
}

window.addEventListener("load", async () => {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session){
    document.getElementById("loginCard").style.display="none";
    document.getElementById("app").style.display="block";
  }
});

function addMessage(role, text){
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "msg " + (role === "user" ? "me" : "bot");

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const input = document.getElementById("prompt");
  const text = input.value.trim();
  if(!text) return;

  addMessage("user", text);
  input.value="";

  const { data: { session } } = await supabaseClient.auth.getSession();

  const res = await fetch(MODAL_RUNTIME_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ prompt: text })
  });

  const data = await res.json();
  const output = data?.result?.text || "Error";

  addMessage("assistant", output);
}
</script>

</body>
</html>
