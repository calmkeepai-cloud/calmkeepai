<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calmkeep Chat</title>

<style>
:root{
--bg:#0b1020;
--card:#11172e;
--muted:#a7b8d0;
--text:#eaf2ff;
--electric:#24a4ff;
--seafoam:#89f3d1;
--shadow:0 12px 34px rgba(0,0,0,.38);
--r:18px;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:"Segoe UI",Roboto,sans-serif;
background:
radial-gradient(1000px 500px at 2% 1%, rgba(137,243,209,.12), transparent 60%),
radial-gradient(950px 480px at 98% 99%, rgba(36,164,255,.12), transparent 65%),
linear-gradient(#0b1020,#0b1020);
color:var(--text);
padding:24px;
}

.wrap{max-width:1100px;margin:0 auto;}

h1{
font-size:28px;
margin-bottom:14px;
background:linear-gradient(90deg,var(--electric),var(--seafoam));
-webkit-background-clip:text;
color:transparent;
}

.card{
background:linear-gradient(180deg, rgba(36,164,255,.07), rgba(137,243,209,.05) 65%, rgba(0,0,0,.2)), var(--card);
border-radius:var(--r);
box-shadow:var(--shadow);
padding:16px;
}

.chat{
height:72vh;
overflow:auto;
padding:14px;
border-radius:var(--r);
background:#080c1a;
border:1px solid rgba(255,255,255,.08);
}

.msg{margin:10px 0;display:flex;}

.bubble{
max-width:82%;
padding:12px 14px;
border-radius:16px;
line-height:1.55;
white-space:pre-wrap;
word-wrap:break-word;
border:1px solid rgba(255,255,255,.08);
}

.me{justify-content:flex-end;}
.me .bubble{background:rgba(36,164,255,.12);}

.bot{justify-content:flex-start;}
.bot .bubble{background:rgba(137,243,209,.10);}

.composer{
display:grid;
grid-template-columns:1fr auto;
gap:10px;
margin-top:14px;
}

textarea{
resize:vertical;
height:72px;
width:100%;
border-radius:12px;
border:1px solid rgba(255,255,255,.10);
background:#0a0f22;
color:var(--text);
padding:12px;
font-size:14px;
}

.btn{
cursor:pointer;
padding:12px 16px;
border-radius:999px;
border:none;
font-weight:700;
font-size:14px;
color:#fff;
background:linear-gradient(180deg,#1b97ff,#0b72c4);
}

.status{
margin-top:10px;
font-size:12px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="wrap">
<h1>Calmkeep Chat</h1>

<div class="card">

<div class="chat" id="chat"></div>

<div class="composer">
<textarea id="prompt" placeholder="Type a message…"></textarea>
<button class="btn" id="sendBtn">Send</button>
</div>

<div class="status" id="status">Ready.</div>

</div>
</div>

<script>

const MODAL_RUNTIME_URL =
"https://diargallop--calmkeep-service-calmkeep-service.modal.run/runtime"

let history=[]

const el=id=>document.getElementById(id)

function setStatus(t){
el("status").textContent=t
}

function addMessage(role,text){

const chat=el("chat")

const row=document.createElement("div")
row.className="msg "+(role==="user"?"me":"bot")

const bubble=document.createElement("div")
bubble.className="bubble"
bubble.textContent=text

row.appendChild(bubble)
chat.appendChild(row)

chat.scrollTop=chat.scrollHeight

return bubble
}

function stitchPrompt(){

const lines=history.map(
m=>`${m.role==="user"?"User":"Assistant"}: ${m.content}`
)

return lines.join("\n\n")+"\n\nAssistant:"
}

async function callRuntime(userText){

history.push({role:"user",content:userText})

const payload={
prompt:stitchPrompt(),
params:{}
}

const res=await fetch(MODAL_RUNTIME_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"accept":"application/json"
},
body:JSON.stringify(payload)
})

if(!res.ok){
throw new Error(`HTTP ${res.status}`)
}

const reader=res.body.getReader()
const decoder=new TextDecoder()

let buffer=""
let finalText=""

const bubble=addMessage("assistant","")

while(true){

const {value,done}=await reader.read()

if(done)break

const chunk=decoder.decode(value,{stream:true})

buffer+=chunk

bubble.textContent=buffer
el("chat").scrollTop=el("chat").scrollHeight
}

try{

const data=JSON.parse(buffer)

finalText=data?.result?.text ?? buffer

}catch{

finalText=buffer

}

bubble.textContent=finalText

history.push({
role:"assistant",
content:finalText
})

}

async function send(){

const txt=el("prompt").value.trim()

if(!txt)return

addMessage("user",txt)

el("prompt").value=""

setStatus("Calling runtime…")

try{

await callRuntime(txt)

setStatus("Ready.")

}catch(e){

addMessage("assistant","Error: "+e.message)

setStatus("Error.")

}

}

el("sendBtn").onclick=send

el("prompt").addEventListener("keydown",e=>{

if(e.key==="Enter"&&!e.shiftKey){

e.preventDefault()

send()

}

})

</script>

</body>
</html>
